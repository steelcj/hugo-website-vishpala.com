baseURL = 'https://vishpala.com/'
title = 'Vishpala'
publishDir = 'site'

defaultContentLanguage = 'en-ca'
defaultContentLanguageInSubdir = true

[params]
  description    = "Technology, design, and infrastructure for greater agency."
  description_fr = "Technologie, design et infrastructure pour une plus grande agentivité."
  description_es = "Tecnología, diseño e infraestructura para una mayor agencia."

[params.sectionDescriptions]
  projects  = "Our work on information technology built to endure."
  areas     = "Technology, design, and the infrastructure that connects them."
  resources = "Shared materials from our practice."
  about     = "Our commitments to excellence."

[params.sectionDescriptions_fr]
  projects  = "Infrastructure, outils et systèmes de design conçus pour durer — une sélection de nos travaux."
  areas     = "Les disciplines que nous pratiquons : technologie, design et l'infrastructure qui les relie."
  resources = "Documentation, guides et matériaux partagés issus de notre pratique."
  about     = "Un studio engagé envers la souveraineté, l'accessibilité et l'excellence infrastructurelle."

[params.sectionDescriptions_es]
  projects  = "Infraestructura, herramientas y sistemas de diseño construidos para perdurar — una selección de nuestros trabajos."
  areas     = "Las disciplinas que practicamos: tecnología, diseño y la infraestructura que los conecta."
  resources = "Documentación, guías y materiales compartidos de nuestra práctica."
  about     = "Un estudio comprometido con la soberanía, la accesibilidad y la excelencia en infraestructura."

[languages]
  [languages.en-ca]
    locale     = 'en-CA'
    label      = 'English (Canada)'
    contentDir = 'content/en-ca'
    weight     = 1
    [languages.en-ca.params]
      shortLabel = 'English'

  [languages.fr-ca]
    locale     = 'fr-CA'
    label      = 'Français (Canada)'
    contentDir = 'content/fr-ca'
    weight     = 2
    [languages.fr-ca.params]
      shortLabel = 'Français'

  [languages.es]
    locale     = 'es'
    label      = 'Español'
    contentDir = 'content/es'
    weight     = 3
    [languages.es.params]
      shortLabel = 'Español'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

